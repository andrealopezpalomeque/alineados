name: Keep Alive
on:
  # Removed — using cronjob.org for reliable keep-alive pings.
  # GitHub Actions cron has 5-30+ min delays, too unreliable for keep-alive.
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: curl -f ${{ secrets.BACKEND_URL }}/health || exit 1
