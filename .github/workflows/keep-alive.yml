name: Keep Alive
on:
  schedule:
    # Every 14 minutes to prevent Render free tier from sleeping (15 min timeout)
    - cron: '*/14 * * * *'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: curl -sf --max-time 30 ${{ secrets.BACKEND_URL }}/health || true
