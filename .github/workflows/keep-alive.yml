name: Keep Alive
on:
  schedule:
    # Every 10 minutes — safe margin under Render's 15 min sleep threshold
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping backend
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
               --max-time 120 \
               --retry 2 \
               --retry-delay 15 \
               --retry-max-time 180 \
               ${{ secrets.BACKEND_URL }}/health || true