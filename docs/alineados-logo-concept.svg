<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Logomark: Three aligned bars forming a stylized A -->
  <g transform="translate(0, 10)">
    <!-- Left bar -->
    <rect x="12" y="20" width="6" height="80" rx="3" fill="#1e3a5f"/>
    <!-- Center bar (tallest) -->
    <rect x="26" y="0" width="6" height="100" rx="3" fill="#2563eb"/>
    <!-- Right bar -->
    <rect x="40" y="20" width="6" height="80" rx="3" fill="#1e3a5f"/>
    <!-- Horizontal alignment bar -->
    <rect x="8" y="42" width="42" height="5" rx="2.5" fill="#2563eb" opacity="0.85"/>
  </g>
  
  <!-- Wordmark -->
  <text x="72" y="75" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="700" fill="#0f172a" letter-spacing="-1">
    Alineados
  </text>
  
  <!-- Tagline -->
  <text x="74" y="98" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="500" fill="#64748b" letter-spacing="3.5" text-transform="uppercase">
    INTELIGENCIA POLÍTICA
  </text>
</svg>
