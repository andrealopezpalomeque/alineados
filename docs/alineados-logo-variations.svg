<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  
  <!-- Title -->
  <text x="20" y="30" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#94a3b8" letter-spacing="2" font-weight="600">LOGO VARIATIONS</text>
  
  <!-- 1. Icon Mark Only -->
  <text x="20" y="70" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8" letter-spacing="1.5" font-weight="500">ICON MARK</text>
  
  <g transform="translate(20, 80)">
    <rect width="70" height="70" rx="16" fill="#0f172a"/>
    <rect x="18" y="18" width="5" height="48" rx="2.5" fill="#3b82f6" opacity="0.5"/>
    <rect x="28" y="8" width="5" height="54" rx="2.5" fill="#3b82f6"/>
    <rect x="38" y="18" width="5" height="48" rx="2.5" fill="#3b82f6" opacity="0.5"/>
    <rect x="48" y="18" width="5" height="48" rx="2.5" fill="#3b82f6" opacity="0.5"/>
    <rect x="15" y="32" width="42" height="4" rx="2" fill="#60a5fa" opacity="0.9"/>
  </g>
  
  <!-- 2. Horizontal - Light Background -->
  <text x="20" y="185" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8" letter-spacing="1.5" font-weight="500">HORIZONTAL — LIGHT BACKGROUND</text>
  
  <g transform="translate(20, 195)">
    <rect x="-10" y="-10" width="400" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- Icon -->
    <rect x="10" y="6" width="48" height="48" rx="12" fill="#0f172a"/>
    <rect x="21" y="14" width="4" height="34" rx="2" fill="#3b82f6" opacity="0.5"/>
    <rect x="28" y="8" width="4" height="38" rx="2" fill="#3b82f6"/>
    <rect x="35" y="14" width="4" height="34" rx="2" fill="#3b82f6" opacity="0.5"/>
    <rect x="42" y="14" width="4" height="34" rx="2" fill="#3b82f6" opacity="0.5"/>
    <rect x="19" y="24" width="30" height="3" rx="1.5" fill="#60a5fa" opacity="0.9"/>
    
    <!-- Wordmark -->
    <text x="72" y="33" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" fill="#0f172a" letter-spacing="-0.5">Alineados</text>
    <text x="74" y="49" font-family="Helvetica, Arial, sans-serif" font-size="9" font-weight="500" fill="#94a3b8" letter-spacing="2.5">INTELIGENCIA POLÍTICA</text>
  </g>
  
  <!-- 3. Horizontal - Dark Background -->
  <text x="20" y="305" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8" letter-spacing="1.5" font-weight="500">HORIZONTAL — DARK BACKGROUND</text>
  
  <g transform="translate(20, 315)">
    <rect x="-10" y="-10" width="400" height="80" rx="8" fill="#0f172a"/>
    
    <!-- Icon -->
    <rect x="10" y="6" width="48" height="48" rx="12" fill="white" opacity="0.08"/>
    <rect x="21" y="14" width="4" height="34" rx="2" fill="#3b82f6" opacity="0.5"/>
    <rect x="28" y="8" width="4" height="38" rx="2" fill="#3b82f6"/>
    <rect x="35" y="14" width="4" height="34" rx="2" fill="#3b82f6" opacity="0.5"/>
    <rect x="42" y="14" width="4" height="34" rx="2" fill="#3b82f6" opacity="0.5"/>
    <rect x="19" y="24" width="30" height="3" rx="1.5" fill="#60a5fa" opacity="0.9"/>
    
    <!-- Wordmark -->
    <text x="72" y="33" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" fill="white" letter-spacing="-0.5">Alineados</text>
    <text x="74" y="49" font-family="Helvetica, Arial, sans-serif" font-size="9" font-weight="500" fill="#64748b" letter-spacing="2.5">INTELIGENCIA POLÍTICA</text>
  </g>
  
  <!-- 4. Favicon / Small -->
  <text x="20" y="425" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8" letter-spacing="1.5" font-weight="500">FAVICON / APP ICON</text>
  
  <g transform="translate(20, 435)">
    <!-- 32px concept -->
    <rect width="40" height="40" rx="8" fill="#0f172a"/>
    <rect x="10" y="10" width="3" height="26" rx="1.5" fill="#3b82f6" opacity="0.5"/>
    <rect x="16" y="5" width="3" height="30" rx="1.5" fill="#3b82f6"/>
    <rect x="22" y="10" width="3" height="26" rx="1.5" fill="#3b82f6" opacity="0.5"/>
    <rect x="28" y="10" width="3" height="26" rx="1.5" fill="#3b82f6" opacity="0.5"/>
    <rect x="8" y="19" width="25" height="2.5" rx="1.25" fill="#60a5fa" opacity="0.9"/>
  </g>
  
  <g transform="translate(80, 435)">
    <!-- iOS style -->
    <rect width="40" height="40" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="10" y="10" width="3" height="26" rx="1.5" fill="#1e3a5f" opacity="0.4"/>
    <rect x="16" y="5" width="3" height="30" rx="1.5" fill="#2563eb"/>
    <rect x="22" y="10" width="3" height="26" rx="1.5" fill="#1e3a5f" opacity="0.4"/>
    <rect x="28" y="10" width="3" height="26" rx="1.5" fill="#1e3a5f" opacity="0.4"/>
    <rect x="8" y="19" width="25" height="2.5" rx="1.25" fill="#2563eb" opacity="0.85"/>
  </g>
</svg>
